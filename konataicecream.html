<!DOCTYPE html>
<html>
<head>
 <title>stemers snack reviewer</title>   
 <style>
  body{
    background-color: #ffcc00;
    font-family: 'Arial Black', sans-serif;
    text-align: left;
    padding: 50px 20px;
  }
  div{
    background-color: white;
    border: 4px solid crimson;
    border-radius: 15px;
    padding: 30px;
    max-width: 500px;
    margin: 0 auto;
    box-shadow: 8px 8px 0px black; 
  }
  a{
    display: inline-block;
    background-color: crimson;
    color: white;
    padding: 12px 24px;
    text-decoration: none;
    border-radius: 6px;
  }
  a:hover{
    background-color: crimson;
    transform: scale(1.05) rotate(-18deg);
  }
  img{
    width: 100%;
    max-width: 300px;
    border: black;
    border-radius: 8px;
    text-align: center;
  }
  #vote-btn {
    display: block;
    margin: 20px auto;
    background-color: black;
    color: white;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s ease;
  }
  #vote-btn:hover{
    background-color: red;
    color: white;
    transform: scale(1.05);
  }

 </style>
</head>    

<body>
 <div>
 
  <p style="text-align: center; font-size: 24px; font-weight: bold;">reviewing stem snacks right from the culture</p>
  <img src="https://icefoodeg.com/wp-content/uploads/2024/07/conata-cone.png" alt="the konata glitched">
  <h2>current review: konata ice cream</h2>
  <p>doesn't have a mother company, but hell yeah it is the best</p>
  <h2>flavors</h2>
  <p>1:chocolate</p>
  <p>2:vanilla</p>
  <p>3:pistachio</p>
  <p>4:cookies</p>
  <p>5:caramel</p>
  <button id="vote-btn">vote for konata (0 votes)</button>
  <a href="index.html">return to the full kitchen</a>
 </div>
 <script>
      let votecount = 0;
      const votebutton = document.getElementById("vote-btn")

      votebutton.addEventListener("click", function() {
         votecount = votecount + 1;
         votebutton.textContent = "vote for konata ("+votecount+" votes)";
      })

 </script>
</body>

</html>
