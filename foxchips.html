<!DOCTYPE html>
<html>
<head>
 <title>stemers snack reviewer</title>   
 <style>
  body{
    background-color: #ffcc00;
    font-family: 'Arial Black', sans-serif;
    text-align: left;
    padding: 50px 20px;
  }
  div{
    background-color: white;
    border: 4px solid crimson;
    border-radius: 15px;
    padding: 30px;
    max-width: 500px;
    margin: 0 auto;
    box-shadow: 8px 8px 0px black; 
  }
  a{
    display: inline-block;
    background-color: crimson;
    color: white;
    padding: 12px 24px;
    text-decoration: none;
    border-radius: 6px;
  }
  a:hover{
    background-color: crimson;
    transform: scale(1.05) rotate(-18deg);
  }
  img{
    width: 100%;
    max-width: 300px;
    border: black;
    border-radius: 8px;
    text-align: center;
  }
  #vote-btn {
    display: block;
    margin: 20px auto;
    background-color: black;
    color: white;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s ease;
  }
  #vote-btn:hover{
    background-color: red;
    color: white;
    transform: scale(1.05);
  }
  #order-btn {
    display: block;
    margin: 20px auto;
    background-color: transparent;
    color: white;
    font-family: sans-serif;
    font-weight: bold;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s ease;
  }
  #order-btn:hover{
    background-color: yellow;
    color: black;
    transform: scale(1.05);
  }
  #status{
    font-weight: bold;
    margin-top: 10px;
  }
 </style>
</head>    

<body>
 <div>
 
  <p style="text-align: center; font-size: 24px; font-weight: bold;">reviewing stem snacks right from the culture</p>
  <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRYcthGNbEIXWNQpVWIw9TE9jfHIhj51VKhvg&s" alt="the fox chips glitched">
  <h2>current review:fox chips</h2>
  <p>also a multi known chips across egypt and stemers</p>
  <h2>flavors</h2>
  <p>1:salty</p>
  <p>2:ketchup</p>
  <p>3:kabab</p>
  <p>4:cheese</p>
  <p>5:mexican salsa</p>
  <p id="secret">click below to reveal the chef secret</p>
  <button id="secret-btn">reveal secret</button>
  <button id="order-btn">order here!!</button>
  <p id="status">kitchen status: if hungry place order!!!</p>
  <button id="vote-btn">vote for foxchips (0 votes)</button>
  <a href="index.html">return to the full kitchen</a>
 </div>
 <script>
      let votecount = 0;
      const votebutton = document.getElementById("vote-btn")
      const orderbutton =  document.getElementById("order-btn")
      const status = document.getElementById("status")
      const secretbutton = document.getElementById("secret-btn");
      const secret = document.getElementById("secret");

      secretbutton.addEventListener("click", function() {
         secret.textContent = "The secret ingredient is just massive amounts of ghee and pure nostalgia!";
      });

      orderbutton.addEventListener("click", function() {
         status.textContent = "kitchen status: order placed, please wait for your food";
         
         setTimeout(function() {
            status.textContent = "kitchen status: your order is ready, please enjoy your food";
         }, 5000);
      })
      votebutton.addEventListener("click", function() {
         votecount = votecount + 1;
         votebutton.textContent = "vote for foxchips ("+votecount+" votes)";
      })

 </script>
</body>

</html>
